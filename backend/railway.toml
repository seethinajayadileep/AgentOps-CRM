# AgentOps CRM - Railway Deployment Configuration

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = ""  # Uses Dockerfile ENTRYPOINT
healthcheckPath = "/actuator/health"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
numReplicas = 1

[env]
# These should be set in Railway dashboard, not here
# PORT is automatically injected by Railway
